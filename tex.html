<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live LaTeX Renderer</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e1e;
            color: #cfcfcf;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            width: 50%;
        }

        #left {
            border-right: 2px solid #333;
        }

        #right {
            background-color: #f7f7f7;
            color: #000;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #fff;
        }

        textarea {
            flex: 1;
            background-color: #2d2d2d;
            color: #dcdcaa;
            border: 1px solid #444;
            padding: 15px;
            font-family: "Fira Code", Consolas, monospace;
            font-size: 15px;
            resize: none;
            outline: none;
            border-radius: 6px;
            white-space: pre;
            line-height: 1.4;
        }

        textarea:focus {
            border-color: #007acc;
        }

        button {
            margin-top: 15px;
            padding: 14px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #005f9e;
        }

        .hint {
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
        }

        .loading {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            color: #555;
            background: #eee;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="left" class="panel">
        <h2>LaTeX Editor</h2>
        <textarea id="code-editor"></textarea>
        <button onclick="render()">⚡ Render Document</button>
        <div class="hint">Sends code to the backend for robust LaTeX compilation using pdflatex and dvisvgm.</div>
    </div>
    <div id="right" class="panel">
        <div id="loading" class="loading">Rendering...</div>
        <div id="canvas"></div>
    </div>

    <script>
        async function render() {
            const code = document.getElementById('code-editor').value;
            const canvas = document.getElementById('canvas');
            const loading = document.getElementById('loading');

            loading.style.display = 'block';
            canvas.innerHTML = '';

            try {
                const response = await fetch('/api/render', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                if (response.ok) {
                    const svgText = await response.text();
                    canvas.innerHTML = svgText;
                } else {
                    canvas.innerHTML = `<div style="color: #ff5555; padding: 20px;">Error rendering circuit. Please check your LaTeX syntax.</div>`;
                }
            } catch (error) {
                canvas.innerHTML = `<div style="color: #ff5555; padding: 20px;">Failed to communicate with the server.</div>`;
            }

            loading.style.display = 'none';
        }

        // Default Sample Code on Initial Load
        document.getElementById('code-editor').value =
            `\\documentclass[tikz, border=2mm]{standalone}
\\usepackage{circuitikz}

\\begin{document}

\\begin{circuitikz}
\\draw (0,0) to[V,v=10V] (0,2) to[R, l=$R_1$, a=2\\Omega] (2,2) to[C, l=$C_1$] (2,0) -- (0,0);
\\end{circuitikz}

\\end{document}`;

        // Auto-render the code upon initialization
        setTimeout(render, 500);
    </script>
</body>

</html>
